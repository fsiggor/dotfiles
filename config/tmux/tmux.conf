# Tmux Configuration
# Docs: https://man7.org/linux/man-pages/man1/tmux.1.html
# Cheatsheet: https://tmuxcheatsheet.com/

# ── Prefix ────────────────────────────────────────────────────────
# Remap prefix from Ctrl-b to Ctrl-a (closer to home row, same as GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix                # Press Ctrl-a twice to send literal Ctrl-a

# ── General ───────────────────────────────────────────────────────
set -g mouse on                     # Enable mouse for scrolling, pane selection, and resizing
set -g base-index 1                 # Start window numbering at 1 (0 is far from prefix key)
setw -g pane-base-index 1           # Start pane numbering at 1 to match window numbering
set -g renumber-windows on          # Re-number windows sequentially when one is closed
set -g set-clipboard on             # Allow tmux to set the system clipboard via OSC 52
set -g detach-on-destroy off        # Switch to another session instead of detaching when a session is destroyed
set -sg escape-time 0               # No delay after pressing Escape (critical for vim/neovim users)
set -g history-limit 100000         # Scrollback buffer size (lines per pane)
set -g focus-events on              # Pass focus events to programs (needed by neovim autoread)

# ── Display ───────────────────────────────────────────────────────
# https://github.com/tmux/tmux/wiki/FAQ#how-do-i-use-rgb-colour
set -g default-terminal "tmux-256color"         # Enable 256 colors inside tmux
set -ag terminal-overrides ",alacritty:RGB"     # Enable true color (24-bit RGB) for Alacritty
set -g allow-passthrough on                     # Allow escape sequences to pass through (for images, OSC)
set -g status-interval 5                        # Refresh status bar every 5 seconds (default: 15)

# ── Vi mode ───────────────────────────────────────────────────────
# Use vim keybindings in copy mode (prefix + [ to enter)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection          # v: start visual selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel # y: yank selection and exit copy mode
bind -T copy-mode-vi C-v send -X rectangle-toggle       # Ctrl-v: toggle block/rectangle selection

# ── Navigation ────────────────────────────────────────────────────
# Split panes with | and - (more intuitive than " and %)
# -c "#{pane_current_path}" opens new pane in the same directory
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"    # prefix + |: vertical split
bind - split-window -v -c "#{pane_current_path}"    # prefix + -: horizontal split

# New window inherits current working directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane switching (prefix + h/j/k/l)
bind h select-pane -L               # Move to left pane
bind j select-pane -D               # Move to pane below
bind k select-pane -U               # Move to pane above
bind l select-pane -R               # Move to right pane

# Resize panes in steps of 5 (-r = repeatable without pressing prefix again)
bind -r H resize-pane -L 5          # Grow pane left
bind -r J resize-pane -D 5          # Grow pane down
bind -r K resize-pane -U 5          # Grow pane up
bind -r L resize-pane -R 5          # Grow pane right

# Quick window switching (repeatable)
bind -r C-h previous-window         # prefix + Ctrl-h: previous window
bind -r C-l next-window             # prefix + Ctrl-l: next window

# Swap/reorder windows (-d keeps focus on moved window)
bind -r "<" swap-window -d -t -1    # prefix + <: move window left
bind -r ">" swap-window -d -t +1    # prefix + >: move window right

# ── Session ───────────────────────────────────────────────────────
bind S command-prompt -p "New session:" "new-session -A -s '%%'"    # prefix + S: create/attach named session
bind K confirm-before -p "Kill session #S? (y/n)" kill-session      # prefix + K: kill session with confirmation

# ── Utilities ─────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"  # prefix + r: reload this config
bind x kill-pane                     # prefix + x: close current pane (no confirmation)
bind X kill-window                   # prefix + X: close current window
bind Space last-window               # prefix + Space: toggle between last two windows
bind Enter copy-mode                 # prefix + Enter: enter copy mode (scrollback)

# ── Status bar ────────────────────────────────────────────────────
# https://man7.org/linux/man-pages/man1/tmux.1.html#STYLES
set -g status-position top                                   # Show status bar at top of screen
set -g status-style "bg=#1a1b26,fg=#c0caf5"                 # Tokyo Night background/foreground
set -g status-left-length 40                                 # Max length of left status section
set -g status-right-length 60                                # Max length of right status section
set -g status-left "#[fg=#7aa2f7,bold] #S #[default]│ "     # Show session name in blue
set -g status-right "#[fg=#9ece6a]#{?client_prefix,#[fg=#f7768e]PREFIX ,}#[fg=#565f89]%H:%M "  # Show PREFIX indicator + clock

# Window status tabs
setw -g window-status-format "#[fg=#565f89] #I:#W "                 # Inactive: dim gray
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "    # Active: bold blue
setw -g window-status-separator ""                                   # No separator between tabs

# Pane borders
set -g pane-border-style "fg=#414868"            # Inactive pane border: dark gray
set -g pane-active-border-style "fg=#7aa2f7"     # Active pane border: blue

# Message/command prompt style
set -g message-style "bg=#1a1b26,fg=#c0caf5"
